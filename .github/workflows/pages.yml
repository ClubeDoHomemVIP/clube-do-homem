name: Publicar página de vendas

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Preparar site público
        run: |
          mkdir -p _site
          cp public/oferta.html _site/index.html
          cp public/oferta.css public/oferta-image.css public/checkout.css public/oferta.js _site/
          cp public/clube-hero.jpeg public/clube-logo.png public/og.jpg _site/
          cp -r public/assets _site/assets
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
